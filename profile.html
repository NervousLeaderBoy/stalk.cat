<!DOCTYPE html>
<html>
<head>
<title>Мой профиль</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/prof.css">
<link rel="stylesheet" href="css/textstandart.css">
</head>
<header>
        <div class = "header-img"></div>
        <div>
            <table class = "headtable"> <tr>
                <th><a class = "headline" href = "profile.html" > Профиль </a></th> 
                <th><a class = "headline" href = "404 copy.html" > О сайте </a></th>
                <th><a class = "headline" href = "players.html" > Игроки </a></th>
                <th><a class = "headline" href = "404 copy.html" > Игровая </a></th>
                <th><a class = "headline" href = "chat.html" > Чат </a></th>
                <th><a class = "headline" href = "404 copy.html" > Лс </a></th>
                <th><a class = "headline" href = "404 copy.html" > Блоги </a></th>
                <th><a class = "headline" href = "news.html" > Новости </a></th>
                <th><a class = "headline" href = "404 copy.html" > Выход </a></th>
            </tr></table>
        </div>
    
</header>
<body>
  <div class = "wrapper">
    <h3 class = "vis"> Профиль </h3>
    <div class = "transblock">
        <br>
        <div class = "block profileblock" > 
            <table> <tr>
                <th>
                    <a href="404 copy.html"><img class = "avatar" src = "images/defaultpic.png"></a>
                </th>
                <th>
                    <div class = "infoblock">Имя персонажа</div>
                    <div class = "infoblock">ID: </div>
                    <div class = "infoblock">Время в игре</div>
                    <a class = "nounderline" href="settings.html"><div class = "infoblock">Настройки</div></a>
                    <br> <br> <br> <br> <br> <br> 
                </th>
            </tr>
            </table> 
            <br></div>    
            <hr noshade>
            <hr noshade>
            <div>
                <div>
                <br>
                <form class = "bbtable">                 
                    <button class="bbcode" title="Жирный" data-code="b"><b>B</b></button>
                    <button class="bbcode" title="Курсив" data-code="i"><i>I</i></button>
                    <button class="bbcode" title="Подчёркнутый" data-code="u"><u>U</u></button>
                    <button class="bbcode" title="Зачёркнутый" data-code="s"><s>S</s></button>
                    <button class="bbcode" title="Надчёркнутый" data-code="o"><span style="text-decoration:overline">O</span></button>
                    <button class="bbcode" title="По центру" data-code="center">center</button>
                    <button class="bbcode" title="Справа" data-code="right">right</button>
                    <button class="bbcode" title="Выравнивание по ширине" data-code="justify">justify</button>
                    <button class="bbcode" title="Ссылка" data-code="url" data-parameter="1" data-text="Куда ведёт ссылка:">url</button>
                    <button class="bbcode" title="Картинка" data-code="img">img</button>
                    <button class="bbcode" title="Цвет текста" data-code="color" data-parameter="1" data-text="Выберите цвет текста (например, #00FF00 или green):">color</button>
                    <button class="bbcode" title="Цвет фона текста" data-code="bgr" data-parameter="1" data-text="Выберите цвет фона (например, #FF0000 или red):">bgr</button>
                    <button class="bbcode" title="Цвет фона строки" data-code="bgrf" data-parameter="1" data-text="Выберите цвет фона (например, #FF0000 или red):">bgrf</button>
                    <button class="bbcode" title="Размер текста" data-code="size" data-parameter="1" data-text="Выберите размер текста (примеры: 11 — обычный текст, 7 — маленький, 20 — большой):">size</button>
                    <button class="bbcode" title="Шрифт" data-code="font" data-parameter="1" data-text="Выберите шрифт текста:">font</button>
                    <button class="bbcode" title="Линия" data-code="hr" data-parameter="0">hr</button>
                    <button class="bbcode" title="Заголовок раскрывающегося блока" data-code="header" data-parameter="1" data-text="Введите название раскрывающегося блока:">header</button>
                    <button class="bbcode" title="Раскрывающийся блок" data-code="block" data-parameter="1" data-text="Введите название раскрывающегося блока (то же, что и у заголовка, который раскрывает этот блок):">block</button>
                    <button class="bbcode" title="Аудио" data-code="audio">audio</button>
                    <button class="bbcode" title="Видео" data-code="video">video</button>
                    <button class="bbcode" title="Фон" data-code="div">div</button>
                    <button class="bbcode" title="Повторяющийся фон" data-code="divr">divr</button>                    
                </form>
                <form>
                    <textarea name="message" class = "textblockstandart standarttext"></textarea>
                    <table><tr><th><button type = "submit" class = "buttonsimple">Сохранить информацию</button></th><th><button class="buttonsimple">Предпросмотр</button></th></tr></table>
                </form>
            </div>
        </div>
        
    </div> 


    <div class = "footer"> 
    <p>Помогите</p>
    </div>
  </div> 

</body>
</html>
